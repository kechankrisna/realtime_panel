networks:
    soketi-network:
        name: realtime-panel-network
        driver: bridge

services:
    realtime-panel:
        build:
            context: ./docker
            dockerfile: Dockerfile
        image: realtime-panel
        container_name: realtime-panel
        depends_on:
            mysql:
                condition: service_healthy # Important for auto database migration
        volumes:
            - ".:/var/www/html"
        networks:
            - soketi-network
        healthcheck:
            test: ["CMD", "php-fpm8.3", "-t"]
            start_period: 120s
            interval: 10s
            retries: 5
            timeout: 5s

    nginx:
        image: "nginx:stable-alpine3.17-slim"
        container_name: realtime-panel-nginx
        depends_on:
            - realtime-panel
            - soketi
        volumes:
            - "./docker/nginx.conf:/etc/nginx/conf.d/default.conf"
            - ".:/var/www/html"
        ports:
            - "${APP_PORT:-80}:80"
        networks:
            - soketi-network

    mysql:
        image: "mysql/mysql-server:8.0"
        container_name: realtime-panel-mysql
        command: >
            --innodb-buffer-pool-size=256M
            --innodb-log-file-size=48M
            --performance-schema=OFF
            --max-connections=50
        environment:
            MYSQL_RANDOM_ROOT_PASSWORD: "yes"
            MYSQL_ROOT_HOST: "%"
            MYSQL_DATABASE: "${DB_DATABASE}"
            MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
            MYSQL_USER: "${DB_USERNAME}"
            MYSQL_PASSWORD: "${DB_PASSWORD}"
        volumes:
            - "./docker/data/mysql:/var/lib/mysql"
        networks:
            - soketi-network
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-u",
                    "${DB_USERNAME}",
                    "-p${DB_PASSWORD}",
                ]
            retries: 10
            timeout: 5s
            interval: 5s
            start_period: 60s

    redis:
        image: "redis:7.2-alpine"
        container_name: realtime-panel-redis
        user: root
        command: >
            sh -c "chown -R redis:redis /data && exec gosu redis redis-server --save 60 1 --loglevel warning --requirepass \"${REDIS_PASSWORD}\""
        volumes:
            - "./docker/data/redis:/data"
        networks:
            - soketi-network

    soketi:
        image: 'quay.io/soketi/soketi:latest-16-alpine'
        container_name: realtime-websocket-server
        depends_on:
            - mysql
            - redis
        volumes:
            - "./.env:/app/.env"
        networks:
            - soketi-network
